# gitleaks configuration for ClinicalEligibility.
# Extends the default rule set; allowlists the two known test fixtures that are
# not real secrets (verified during the open-source split).

[extend]
useDefault = true

[allowlist]
description = "Known test fixtures - not real secrets"
regexes = [
  # UmlsClientTests.vb - placeholder key for a stubbed HTTP handler.
  '''test-api-key-1234''',
  # UmlsLogRedactionHandlerTests.vb - fixture that verifies apiKey redaction.
  '''secret-1234-abcd''',
]
paths = [
  '''contexts/eligibility/tests/EligibilityProcessing.Umls.Tests/UmlsClientTests.vb''',
  '''contexts/eligibility/tests/EligibilityProcessing.Umls.Tests/UmlsLogRedactionHandlerTests.vb''',
]
