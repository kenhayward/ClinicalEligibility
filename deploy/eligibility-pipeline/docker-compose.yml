# Architecture spec §5: reference deployment topology.
#
# Configuration: every service reads ../.env via the `env_file:` directive
# below. That's the same .env file the dev hosts use via DotEnvLoader, so
# secrets/endpoints live in exactly one place. Override per-environment by
# pointing env_file at a different path (e.g. /etc/eligibility/prod.env).
#
# Postgres: both the source (AACT) and output databases are EXTERNAL to this
# compose file — Postgres__ConnectionString{Source,Output} in .env point at
# wherever they actually live. We don't run an embedded Postgres; production
# uses a dedicated DB server on the LAN. The web container reaches those
# hosts via the default bridge network's outbound routing.
#
# If your output Postgres lives on a LAN host that the default bridge can't
# reach (rare — bridge networks normally have outbound to the host's
# network), use `network_mode: host` instead, or replace LAN-IP literals
# with `host.docker.internal` (Docker Desktop) / the host's IP.
#
# CLI: runs as a long-lived idle `eligibility-cli` container you exec into to
# issue commands (it shares the same env_file, so connection strings/endpoints
# match the web host). Example:
#   docker exec -it eligibility-cli elig migrate
#   docker exec -it eligibility-cli elig normalize-umls --count 500
# See the `eligibility-cli` definition below.

# Project (stack) name. Without this, Compose derives the project name from
# the directory the compose file sits in (`deploy`), which would namespace
# every resource as `deploy_*`. Pinning it to `eligibility` keeps the stack
# name stable regardless of where the source tree is checked out.
name: eligibility

services:
  # HAProxy in front of the chat-completions servers used by the EXTRACTION call.
  # Pools the always-on GPU with up to two intermittent ones, so a run uses whatever
  # capacity exists at that moment. Only Llm__BaseUrl points here: the normalize and
  # embedding endpoints address their servers directly (see .env.example).
  #
  # Why a proxy instead of scaling the app: the pipeline is ~96.7% LLM time and already
  # runs at ~98.4% of its LLM-bound floor, so one app process saturates whatever it
  # points at. More throughput needs more model slots, not more workers.
  #
  # HAProxy rather than nginx for two reasons: active health checks (open-source nginx
  # has none, so it can only discover an absent GPU by failing a real request), and
  # per-server maxconn, which models llama.cpp's slot count exactly and queues the
  # surplus instead of oversubscribing a card.
  llm-proxy:
    image: haproxy:3.0-alpine
    container_name: eligibility-llm-proxy
    restart: unless-stopped
    ports:
      # 8090: entry point, for a local `dotnet run` outside compose. Containers use
      # the service name (http://llm-proxy:8080/v1) and need no published port.
      - "${LLM_PROXY_PORT:-8090}:8080"
      # Stats page: which GPUs are up and how loaded each is. No auth - LAN only.
      - "${LLM_PROXY_STATS_PORT:-8404}:8404"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    environment:
      # Address + SLOT COUNT per GPU. The slot count is that server's llama.cpp
      # --parallel (or LM Studio max concurrent) and is what stops HAProxy
      # oversubscribing it.
      #
      # The :-defaults are load-bearing: `maxconn ""` is silently accepted by HAProxy
      # and means UNLIMITED, which would flood one GPU with every request and quietly
      # defeat the whole design. haproxy.cfg also refuses to start on an empty value.
      #
      # Unset aux GPUs default to TEST-NET-1 (RFC 5737) addresses - guaranteed
      # unroutable, so they sit permanently DOWN in the stats page and take no traffic
      # until you fill them in. Nothing breaks while they are absent.
      - LLM_GPU_PRIMARY_ADDR=${LLM_GPU_PRIMARY_ADDR:-192.0.2.1:1234}
      - LLM_GPU_PRIMARY_SLOTS=${LLM_GPU_PRIMARY_SLOTS:-4}
      - LLM_GPU_AUX1_ADDR=${LLM_GPU_AUX1_ADDR:-192.0.2.2:1234}
      - LLM_GPU_AUX1_SLOTS=${LLM_GPU_AUX1_SLOTS:-4}
      - LLM_GPU_AUX2_ADDR=${LLM_GPU_AUX2_ADDR:-192.0.2.3:1234}
      - LLM_GPU_AUX2_SLOTS=${LLM_GPU_AUX2_SLOTS:-4}
    # Only needed if a GPU runs on the Docker host itself - then use
    # host.docker.internal:<port> as its address. LAN IPs need nothing special.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Config errors (including the empty-slot-count guard) must surface loudly rather
    # than restart-looping in silence.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8404/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Single web host serves both the dashboard (HTML + SignalR live feed) and
  # the production trigger surface (POST /trigger). They were originally split,
  # but the SignalR feed needs the orchestrator to run in the same process as
  # the hub — so they're merged.
  eligibility-web:
    build:
      # `dockerfile` is resolved relative to `context` (the repo root), NOT to
      # this compose file - hence the full path back down to the deploy folder.
      context: ../..
      dockerfile: deploy/eligibility-pipeline/Dockerfile.web
    image: eligibility/web:${ELIGIBILITY_VERSION:-dev}
    # Fixed container name so `docker ps` shows a stable, predictable name
    # rather than the generated `eligibility-eligibility-web-1`. A fixed name
    # rules out scaling this service past one replica, which is fine — it's a
    # singleton host.
    container_name: eligibility-host
    restart: unless-stopped
    ports:
      - "8091:8080"
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      # Container timezone (needs tzdata in the image, which Dockerfile.web installs).
      # Defaults to UTC; set TZ in .env (e.g. TZ=Europe/London) for local timestamps.
      - TZ=${TZ:-UTC}
    # Reach a Postgres running on the host via Host=host.docker.internal in .env.
    # Built in on Docker Desktop; REQUIRED on Linux Docker Engine to resolve it.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Disable IPv6 inside the container so host.docker.internal resolves/connects
    # over IPv4 only. Without this, an IPv6 address can be tried first and fail
    # with "Network unreachable" (the container has no IPv6 route), even though
    # the IPv4 path to the host works.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    # Persist ASP.NET Core DataProtection keys across container recreates.
    # These keys encrypt the auth cookie + anti-forgery tokens; without a volume
    # they live in the ephemeral container FS, so every redeploy invalidates all
    # sessions (users are silently logged out) — see the DataProtection warning
    # in the container log.
    volumes:
      - dataprotection-keys:/root/.aspnet/DataProtection-Keys

  # Long-lived CLI tools container. It idles (tail -f /dev/null) so you can exec
  # into it and run CLI commands interactively against the same .env / databases
  # / LLM endpoint as the web host. Started by `docker compose up`, rebuilt and
  # recreated on each deploy. Use the bundled `elig` wrapper:
  #   docker exec -it eligibility-cli elig migrate
  #   docker exec -it eligibility-cli elig normalize-umls --count 500
  #   docker exec -it eligibility-cli elig status
  #   docker exec -it eligibility-cli sh        # then: elig run --count 50, elig retry-umls, ...
  # (One-shot still works too: docker compose run --rm --entrypoint elig eligibility-cli migrate)
  eligibility-cli:
    build:
      # Resolved relative to `context` (the repo root) - see the note above.
      context: ../..
      dockerfile: deploy/eligibility-pipeline/Dockerfile.cli
    image: eligibility/cli:${ELIGIBILITY_VERSION:-dev}
    container_name: eligibility-cli
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Local timestamps (e.g. the normalize-umls ETA finish time). Defaults to UTC;
      # set TZ in .env (e.g. TZ=Europe/London). Needs tzdata, which Dockerfile.cli installs.
      - TZ=${TZ:-UTC}
    # Reach a Postgres running on the host via Host=host.docker.internal in .env.
    # Built in on Docker Desktop; REQUIRED on Linux Docker Engine to resolve it.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Disable IPv6 inside the container so host.docker.internal resolves/connects
    # over IPv4 only. Without this, an IPv6 address can be tried first and fail
    # with "Network unreachable" (the container has no IPv6 route), even though
    # the IPv4 path to the host works.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    # Idle so the container stays up; real work runs via `docker exec`. `tail` is
    # busybox-safe on the alpine runtime (older busybox `sleep` rejects "infinity").
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  # Named volume for the web host's DataProtection keys (auth cookie + CSRF).
  dataprotection-keys:
