# HAProxy in front of the OpenAI-compatible chat-completions servers used by the
# EXTRACTION call (Llm__BaseUrl). Pools one always-on GPU with up to two that come
# and go, so the pipeline uses whatever capacity happens to exist right now.
#
# Only the extraction call goes through here. The normalize call
# (LlmNormalize__BaseUrl) and embeddings (Embedding__BaseUrl) address their servers
# directly - they are not throughput-critical and pooling them would only add a hop.
# NOTE: both INHERIT Llm__BaseUrl when left blank, so they must stay explicitly set
# in .env or they will silently start routing through this proxy.
#
# Why a proxy at all rather than scaling the app: the pipeline is ~96.7% LLM time and
# already runs at ~98.4% of its LLM-bound floor, so one app process saturates whatever
# it points at. More throughput means more model slots, not more workers.

# Fail fast on an unset/empty slot count. VERIFIED BEHAVIOUR: `maxconn ""` is accepted
# silently and means UNLIMITED - HAProxy does not complain, and the proxy would then
# flood one GPU with every in-flight request, quietly destroying the only reason this
# proxy exists. Refuse to start instead. (docker-compose.yml also supplies defaults via
# ${VAR:-4}, so this only fires if HAProxy is run by hand without them.)
.if streq("${LLM_GPU_PRIMARY_SLOTS}","")
    .alert "LLM_GPU_PRIMARY_SLOTS is unset or empty. maxconn would silently become unlimited and oversubscribe the GPU. Set it to that server's slot count (llama.cpp --parallel / LM Studio max concurrent)."
.endif
.if streq("${LLM_GPU_AUX1_SLOTS}","")
    .alert "LLM_GPU_AUX1_SLOTS is unset or empty. See LLM_GPU_PRIMARY_SLOTS."
.endif
.if streq("${LLM_GPU_AUX2_SLOTS}","")
    .alert "LLM_GPU_AUX2_SLOTS is unset or empty. See LLM_GPU_PRIMARY_SLOTS."
.endif

global
    # Log to stdout so `docker compose logs llm-proxy` just works.
    log stdout format raw local0 info
    maxconn 4096

defaults
    mode http
    log global
    option httplog
    option dontlognull

    # A powered-off GPU refuses the TCP connection immediately; do not sit waiting.
    timeout connect 2s

    # Generations average ~43s with a long tail. These MUST be generous: HAProxy's
    # defaults are far too short and would cut answers off mid-generation, which the
    # app sees as a truncated or failed call rather than as a proxy timeout.
    timeout client 30m
    timeout server 30m

    # How long a request may wait for a free slot once every GPU is at maxconn. The
    # app deliberately over-subscribes (its concurrency cap is set for all-GPUs-up),
    # so this must be generous or queued requests would 503 during normal operation
    # whenever the aux GPUs are away.
    timeout queue 30m

    # Retries apply to CONNECTION failures only (HAProxy's default retry-on), and
    # redispatch sends the retry to a different server. Safe for non-idempotent POSTs:
    # a refused connection means the request never reached a model, so nothing can be
    # processed twice.
    retries 2
    option redispatch

# DNS re-resolution. NOT optional if any GPU is configured by HOSTNAME rather than IP.
# VERIFIED THE HARD WAY: without this, a server whose name does not resolve when the
# proxy starts (i.e. the machine is switched off - the normal case for an intermittent
# GPU) lands in "MAINT (resolution)" and STAYS THERE FOR EVER. It does not recover when
# the machine returns, because HAProxy only resolves at startup unless a resolvers
# section exists. That silently breaks the one feature this proxy is for.
#
# parse-resolv-conf uses the container's own DNS (Docker's embedded resolver), so both
# LAN hostnames and compose service names work. IP-configured servers never hit this
# path at all - they just go DOWN and come back on health checks.
resolvers dns
    parse-resolv-conf
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    # Re-check a failed name every 10s so a GPU that comes back is picked up promptly.
    hold valid 10s
    hold nx 10s
    hold other 10s
    hold refused 10s
    hold timeout 10s

frontend llm_in
    bind *:8080
    default_backend llm_pool

backend llm_pool
    # leastconn, not roundrobin. Each request occupies a slot for ~43s, so "fewest
    # in flight" is the only sane approximation of "which GPU has a free slot".
    # Roundrobin would keep feeding a saturated card while another idles.
    balance leastconn

    # ACTIVE health checks - the reason this is HAProxy rather than open-source nginx,
    # which only has passive checks and can only discover a dead GPU by failing a real
    # request against it. Here an absent GPU is removed BEFORE it is sent work, and
    # re-added on its own once it answers again. /v1/models is served by both LM Studio
    # and llama.cpp, needs no auth, and does not touch the model.
    option httpchk GET /v1/models
    http-check expect status 200

    # inter 5s / fall 2 / rise 2: a GPU is out after ~10s and back ~10s after it
    # returns. init-addr lets HAProxy start even when a server address does not resolve
    # yet, so a switched-off aux box can never stop the proxy booting - and `resolvers
    # dns` is what lets that server actually come BACK once the name resolves again.
    # Both halves are needed: init-addr alone parks it in MAINT permanently.
    default-server check inter 5s fall 2 rise 2 resolvers dns init-addr last,libc,none

    # maxconn per server IS that GPU's slot count (llama.cpp --parallel, or LM Studio's
    # max concurrent requests). This is the whole point of HAProxy here: it never
    # oversubscribes a card and queues the surplus instead, so the app can hold one
    # concurrency cap sized for all GPUs and let the proxy do the slot accounting as
    # they come and go.
    #
    # Unconfigured aux GPUs default to TEST-NET-1 (RFC 5737) addresses, which are
    # guaranteed unroutable: they sit permanently DOWN in the stats page, take no
    # traffic, and are obviously placeholders. Fill in LLM_GPU_AUX*_ADDR to enable.
    server gpu-primary "${LLM_GPU_PRIMARY_ADDR}" maxconn "${LLM_GPU_PRIMARY_SLOTS}"
    server gpu-aux1    "${LLM_GPU_AUX1_ADDR}"    maxconn "${LLM_GPU_AUX1_SLOTS}"
    server gpu-aux2    "${LLM_GPU_AUX2_ADDR}"    maxconn "${LLM_GPU_AUX2_SLOTS}"

# Which GPUs are up, and how many requests each is carrying. Read-only; no auth, so
# do not publish this port beyond the LAN.
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /
    stats refresh 5s
    stats show-legends
